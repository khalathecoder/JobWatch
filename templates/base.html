<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JobWatch{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --accent: #f59e0b;
      --success: #10b981;
      --warning: #f97316;
      --danger: #ef4444;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-hover: rgba(99,102,241,.15);
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: .75rem;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      padding: 1.5rem 1rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      gap: .25rem;
      z-index: 100;
    }

    .sidebar-logo {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      padding: .25rem 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem .85rem;
      border-radius: .5rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      transition: all .2s;
    }

    .nav-link:hover { background: var(--sidebar-hover); color: #e2e8f0; }
    .nav-link.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      border-radius: 9999px;
      min-width: 1.3rem;
      text-align: center;
    }

    .sidebar-bottom {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    /* ── Main content ────────────────────────────────── */
    .main {
      margin-left: 220px;
      padding: 2rem;
      flex: 1;
      min-height: 100vh;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-actions { display: flex; gap: .75rem; align-items: center; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      padding: .55rem 1.25rem;
      border: none;
      border-radius: .5rem;
      font-weight: 600;
      font-size: .875rem;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.35); }

    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }

    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

    /* ── Cards / surfaces ────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    /* ── Toasts ──────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      z-index: 9999;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: .75rem 1.25rem;
      border-radius: .5rem;
      font-size: .875rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      animation: fadeIn .2s ease;
    }

    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* ── Misc ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-green  { background: #dcfce7; color: #15803d; }
    .badge-red    { background: #fee2e2; color: #b91c1c; }
    .badge-yellow { background: #fef9c3; color: #a16207; }
    .badge-gray   { background: #f1f5f9; color: #475569; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">📊 JobWatch</div>

    <a href="/"          class="nav-link {% if request.path == '/' %}active{% endif %}">
      🏠 Dashboard
      {% if queue_counts is defined and (queue_counts.jobs + queue_counts.companies) > 0 %}
        <span class="nav-badge">{{ queue_counts.jobs + queue_counts.companies }}</span>
      {% endif %}
    </a>
    <a href="/companies" class="nav-link {% if request.path == '/companies' %}active{% endif %}">
      🏢 Companies
    </a>
    <a href="/settings"  class="nav-link {% if request.path == '/settings' %}active{% endif %}">
      ⚙️ Settings
    </a>

    <div class="sidebar-bottom">
      <a href="/logout" class="nav-link">🚪 Logout</a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <div id="toast-container"></div>

  <script>
    function toast(msg, type='') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function apiPost(url, body={}) {
      const r = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      return r.json();
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
