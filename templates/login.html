<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobWatch — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 1rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,.4);
    }
    .logo {
      font-size: 1.75rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .5rem;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .4rem;
    }
    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: .5rem;
      font-size: .95rem;
      margin-bottom: 1.25rem;
      transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    .error {
      background: #fee2e2;
      color: #b91c1c;
      padding: .6rem 1rem;
      border-radius: .5rem;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    .btn-login {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: .5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,.4); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">📊 JobWatch</div>
    <p class="subtitle">Your personal job search command center</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" autofocus autocomplete="username">

      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password">

      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
